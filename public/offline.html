<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="utf-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1, viewport-fit=cover" />
  <meta name="theme-color" content="#2563EB" />
  <title>BuddyIntro — Offline</title>
  <style>
    :root { color-scheme: dark; --bg: #0f172a; --fg: #f8fafc; --muted: #94a3b8; --accent: #2563eb; }
    * { box-sizing: border-box; }
    body {
      margin: 0; min-height: 100dvh; display: flex; align-items: center; justify-content: center;
      font-family: system-ui, -apple-system, Segoe UI, sans-serif; background: var(--bg); color: var(--fg);
      padding: max(16px, env(safe-area-inset-top)) max(16px, env(safe-area-inset-right))
        max(16px, env(safe-area-inset-bottom)) max(16px, env(safe-area-inset-left));
    }
    .card { text-align: center; max-width: 24rem; }
    h1 { font-size: 1.25rem; margin: 0 0 0.5rem; }
    p { color: var(--muted); font-size: 0.9375rem; line-height: 1.5; margin: 0 0 1.25rem; }
    button {
      background: var(--accent); color: #fff; border: 0; border-radius: 9999px;
      padding: 0.625rem 1.25rem; font-size: 0.875rem; font-weight: 600; cursor: pointer;
    }
  </style>
</head>
<body>
  <div class="card">
    <h1>You&rsquo;re offline</h1>
    <p>BuddyIntro needs a connection for fresh introductions and messages. Drafts and queued actions will sync when you&rsquo;re back online.</p>
    <button type="button" onclick="location.reload()">Try again</button>
  </div>
</body>
</html>
